name: Refresh Site Data

on:
  push:
    branches:
      - main
    paths-ignore:
      - data/site-data.json
      - assets/js/site-data-fallback.js
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-site-data-${{ github.ref }}
  cancel-in-progress: true

jobs:
  refresh-site-data:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate site snapshot
        env:
          SITE_DATA_BRANCH: main
        run: sh scripts/refresh_site_data.sh

      - name: Commit updated snapshot
        run: |
          if git diff --quiet -- data/site-data.json assets/js/site-data-fallback.js; then
            echo "No site data changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/site-data.json assets/js/site-data-fallback.js
          git commit -m "Refresh site data snapshot"
          git push
